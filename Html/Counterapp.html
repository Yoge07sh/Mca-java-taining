<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 20px;
            color: #333;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
        }

        button {
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        #incr {
            background: #28a745;
        }

        #incr:hover {
            background: #218838;
            transform: scale(1.05);
        }

        #decr {
            background: #dc3545;
        }

        #decr:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        #res {
            background: #007bff;
        }

        #res:hover {
            background: #0069d9;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 id="number">0</h1>

        <div class="buttons">
            <button id="incr">Add</button>
            <button id="decr">Subtract</button>
            <button id="res">Reset</button>
        </div>
    </div>

    <script>
        let s = 0;
        let a = document.getElementById("number");
        let b = document.getElementById("incr");
        let c = document.getElementById("decr");
        let d = document.getElementById("res");

        b.addEventListener("click", function () {
            s++;
            a.innerText = s;
        });

        c.addEventListener("click", function () {
            s--;
            a.innerText = s;
        });

        d.addEventListener("click", function () {
            s = 0;
            a.innerText = s;
        });
    </script>

</body>

</html>
