<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main container */
.container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    margin-bottom: 15px;
}

/* Input + Button */
.input-box {
    display: flex;
    gap: 10px;
}

#add {
    flex: 1;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

#sub {
    padding: 8px 12px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

#sub:hover {
    background: #45a049;
}

/* Lists */
ul {
    list-style: none;
    padding: 0;
    margin-top: 15px;
}

li {
    background: #f4f4f4;
    padding: 8px;
    margin-top: 8px;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#complist li {
    background: #28a745;
    color: white;
}

/* Buttons */
button {
    margin-left: 5px;
    border: none;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

/* Specific buttons */
button:nth-child(1) {
    background: #e74c3c;
    color: white;
}

button:nth-child(2) {
    background: #3498db;
    color: white;
}
</style>
</head>
<body>
    <div class="container">
        <h1>To do list</h1>

        <div class="input-box">
            <input type="text" id="add" placeholder="Enter new task">
            <button id="sub">Add</button>
        </div>

        <ul id="list"></ul>
        <ul id="complist"></ul>
    </div>
</body>
    <script>
        let add = document.getElementById("add");
        let list = document.getElementById("list");
        let sub = document.getElementById("sub");
        let complist = document.getElementById("complist");
        let task = [];
        let completed = [];
        sub.addEventListener("click", function () {
            let input = add.value.trim();
            let li = document.createElement("li");
            if (input == "") {
                return;
            }
            task.push(input);
            localStorage.setItem("task", JSON.stringify(task));
            li.textContent = input;
            let del = document.createElement("button");
            del.textContent = " Delete";
            li.appendChild(del);
            del.addEventListener("click", function () {
                li.remove();
                task = task.filter(function (t) {
                    return t !== input;
                });
                localStorage.setItem("task", JSON.stringify(task));
            });
            list.appendChild(li);
            let cbtn = document.createElement("button");
            cbtn.textContent = "Completed";
            cbtn.addEventListener("click", function (e) {
                e.stopPropagation();

                li.remove();
                complist.appendChild(li);

                task = task.filter(t => t !== input);
                completed.push(input);
                localStorage.setItem("task", JSON.stringify(task));
                localStorage.setItem("completed", JSON.stringify(completed));
            });
            li.appendChild(cbtn);
            add.value = "";
        });
        window.addEventListener("load", function () {
            let savedCompleted = JSON.parse(localStorage.getItem("completed")) || [];
            completed = savedCompleted;

            completed.forEach(function (item) {
                let li = document.createElement("li");
                li.textContent = item;

                let del = document.createElement("button");
                del.textContent = " Delete";

                del.addEventListener("click", function () {
                    li.remove();

                    completed = completed.filter(t => t !== item);
                    localStorage.setItem("completed", JSON.stringify(completed));
                });

                li.appendChild(del);
                complist.appendChild(li);
            });
            let saved = JSON.parse(localStorage.getItem("task")) || [];
            task = saved;
            task.forEach(function (item) {
                let li = document.createElement("li");
                li.textContent = item;
                let del = document.createElement("button");
                del.textContent = " Delete";
                del.addEventListener("click", function () {
                    li.remove();
                    task = task.filter(function (t) {
                        return t !== item;
                    });
                    localStorage.setItem("task", JSON.stringify(task));
                });
                li.appendChild(del);
                let cbtn = document.createElement("button");
                cbtn.textContent = "Completed";

                cbtn.addEventListener("click", function (e) {
                    e.stopPropagation();

                    li.remove();
                    complist.appendChild(li);

                    task = task.filter(t => t !== item);
                    completed.push(item);

                    localStorage.setItem("task", JSON.stringify(task));
                    localStorage.setItem("completed", JSON.stringify(completed));
                });
                li.appendChild(cbtn);
                list.appendChild(li);

            });
        });
    </script>
</body>

</html>
