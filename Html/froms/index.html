<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!--create a form-->
   <fieldset>
    <legend>Html form </legend>
     <form action="">
        <label for="datepicker">choose date</label>
        <input type="date" id="datepicker">
        <br>
        <label for="selector1">choose dish</label>
        <select name="dishes" id="selector1">
           <option value="maggies">maggie</option>
           <option value="dal">dal</option>
           <option value="roti">Roti</option>
        </select>
        <br>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="enter your email">
        <br>
        <label for="pass_k">password</label>
        <input type="password" id="pass_k" placeholder="enter your email">
        <br>
        <button type="submit">submit</button>
        <br>
        <label for="text">enter your text here</label>
        <br>
        <textarea name="textarea" id="text" placeholder="enter text here"></textarea>
    </form>

   </fieldset>
</body>

</html>
